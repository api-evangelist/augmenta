aid: augmenta
name: Augmenta
description: >-
  Augmenta is a Toronto-based generative AI company building the Augmenta
  Construction Platform (ACP), a Spatial AI system that automates building
  design — starting with electrical raceway routing and expanding into
  mechanical and plumbing (MEP). ACP ingests Revit models, accepts
  conduit run schedules, fly/no-fly zones, and project specifications, then
  generates clash-free, constructable 3D conduit routes in the cloud and
  exports them back into Revit as system conduit ready for detailing and
  prefabrication. The platform combines computational geometry, advanced
  optimization, and machine learning to handle data-center, hospital, and
  school-scale electrical builds, and is marketed to VDC teams and electrical
  contractors as a way to cut BIM time by roughly two-thirds. Augmenta was
  founded by veterans of generative design for advanced manufacturing, won
  EC&M 2026 Product of the Year, was named to the 2026 Global Cleantech 100,
  and signed a five-year strategic partnership with E-J Electric Installation
  Co. The product is delivered as a SOC2-certified Revit add-in with a cloud
  back-end; there is no public REST API, SDK, or open-source release.
